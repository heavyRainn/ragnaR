<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" fill="none">
  <defs>
    <linearGradient id="bg" x1="360" y1="0" x2="360" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1017"/>
      <stop offset="1" stop-color="#070A0F"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#3B82F6" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="720" height="520" rx="16" fill="url(#bg)"/>
  <rect x="1" y="1" width="718" height="518" rx="15" stroke="#1E293B" stroke-width="2"/>

  <text x="360" y="42" text-anchor="middle" fill="#94A3B8" font-family="Inter, Segoe UI, sans-serif" font-size="13" letter-spacing="0.14em">CMIR ARCHITECTURE</text>

  <!-- Level 1 -->
  <g filter="url(#glow)">
    <rect x="170" y="72" width="380" height="64" rx="12" fill="#111827" stroke="#3B82F6" stroke-width="1.5"/>
  </g>
  <text x="360" y="110" text-anchor="middle" fill="#F8FAFC" font-family="Inter, Segoe UI, sans-serif" font-size="22" font-weight="600">CoinMarketCap + Bybit</text>

  <!-- Arrow 1 -->
  <path d="M360 142 L360 168" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>
  <path d="M360 168 L354 158 M360 168 L366 158" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>

  <!-- Level 2 -->
  <rect x="210" y="178" width="300" height="64" rx="12" fill="#111827" stroke="#334155" stroke-width="1.5"/>
  <text x="360" y="216" text-anchor="middle" fill="#E2E8F0" font-family="Inter, Segoe UI, sans-serif" font-size="22" font-weight="600">Signal Engine</text>

  <!-- Arrow 2 -->
  <path d="M360 248 L360 274" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>
  <path d="M360 274 L354 264 M360 274 L366 264" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>

  <!-- Level 3 -->
  <rect x="190" y="284" width="340" height="64" rx="12" fill="#111827" stroke="#334155" stroke-width="1.5"/>
  <text x="360" y="322" text-anchor="middle" fill="#E2E8F0" font-family="Inter, Segoe UI, sans-serif" font-size="22" font-weight="600">Narrative Engine</text>

  <!-- Arrow 3 -->
  <path d="M360 354 L360 380" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>
  <path d="M360 380 L354 370 M360 380 L366 370" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>

  <!-- Level 4 -->
  <rect x="70" y="392" width="170" height="64" rx="12" fill="#111827" stroke="#22C55E" stroke-width="1.5" stroke-opacity="0.55"/>
  <text x="155" y="430" text-anchor="middle" fill="#F8FAFC" font-family="Inter, Segoe UI, sans-serif" font-size="20" font-weight="600">Radar</text>

  <rect x="275" y="392" width="170" height="64" rx="12" fill="#111827" stroke="#A855F7" stroke-width="1.5" stroke-opacity="0.55"/>
  <text x="360" y="430" text-anchor="middle" fill="#F8FAFC" font-family="Inter, Segoe UI, sans-serif" font-size="20" font-weight="600">Replay</text>

  <rect x="480" y="392" width="170" height="64" rx="12" fill="#111827" stroke="#F59E0B" stroke-width="1.5" stroke-opacity="0.55"/>
  <text x="565" y="430" text-anchor="middle" fill="#F8FAFC" font-family="Inter, Segoe UI, sans-serif" font-size="20" font-weight="600">Sectors</text>

  <!-- Connectors to level 4 -->
  <path d="M360 380 L155 392" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M360 380 L360 392" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M360 380 L565 392" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>

  <text x="360" y="492" text-anchor="middle" fill="#64748B" font-family="Inter, Segoe UI, sans-serif" font-size="12">Deterministic rules · Explainable signals · No black box</text>
</svg>
