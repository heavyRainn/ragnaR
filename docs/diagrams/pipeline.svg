<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 240" fill="none">
  <defs>
    <linearGradient id="bg" x1="480" y1="0" x2="480" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1017"/>
      <stop offset="1" stop-color="#070A0F"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1D4ED8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0.12"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#64748B"/>
    </marker>
  </defs>

  <rect width="960" height="240" rx="16" fill="url(#bg)"/>
  <rect x="1" y="1" width="958" height="238" rx="15" stroke="#1E293B" stroke-width="1.5"/>

  <text x="480" y="34" text-anchor="middle" fill="#64748B" font-family="Segoe UI, Inter, sans-serif" font-size="11" letter-spacing="0.18em">DATA PIPELINE</text>
  <text x="480" y="56" text-anchor="middle" fill="#F8FAFC" font-family="Segoe UI, Inter, sans-serif" font-size="18" font-weight="600">From market data to intelligence</text>

  <!-- Stage 1 -->
  <rect x="24" y="88" width="148" height="112" rx="12" fill="#111827" stroke="#334155"/>
  <text x="98" y="114" text-anchor="middle" fill="#94A3B8" font-size="10" letter-spacing="0.12em" font-family="Segoe UI, Inter, sans-serif">SOURCES</text>
  <rect x="38" y="126" width="120" height="28" rx="8" fill="url(#blue)" stroke="#3B82F6" stroke-opacity="0.5"/>
  <text x="98" y="145" text-anchor="middle" fill="#E2E8F0" font-size="12" font-weight="600" font-family="Segoe UI, Inter, sans-serif">CoinMarketCap</text>
  <rect x="38" y="162" width="120" height="28" rx="8" fill="#111827" stroke="#475569"/>
  <text x="98" y="181" text-anchor="middle" fill="#CBD5E1" font-size="12" font-family="Segoe UI, Inter, sans-serif">Bybit 1m</text>

  <path d="M172 144 H196" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 2 -->
  <rect x="200" y="108" width="132" height="72" rx="12" fill="#111827" stroke="#475569"/>
  <text x="266" y="136" text-anchor="middle" fill="#94A3B8" font-size="10" letter-spacing="0.12em" font-family="Segoe UI, Inter, sans-serif">STORE</text>
  <text x="266" y="162" text-anchor="middle" fill="#F8FAFC" font-size="14" font-weight="600" font-family="Segoe UI, Inter, sans-serif">Market</text>
  <text x="266" y="178" text-anchor="middle" fill="#F8FAFC" font-size="14" font-weight="600" font-family="Segoe UI, Inter, sans-serif">Snapshots</text>

  <path d="M332 144 H356" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 3 -->
  <rect x="360" y="108" width="132" height="72" rx="12" fill="#111827" stroke="#F59E0B" stroke-opacity="0.65"/>
  <text x="426" y="136" text-anchor="middle" fill="#F59E0B" font-size="10" letter-spacing="0.12em" font-family="Segoe UI, Inter, sans-serif">ENGINE</text>
  <text x="426" y="164" text-anchor="middle" fill="#F8FAFC" font-size="15" font-weight="600" font-family="Segoe UI, Inter, sans-serif">Signal Engine</text>

  <path d="M492 144 H516" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 4 -->
  <rect x="520" y="108" width="132" height="72" rx="12" fill="#111827" stroke="#A855F7" stroke-opacity="0.65"/>
  <text x="586" y="136" text-anchor="middle" fill="#C084FC" font-size="10" letter-spacing="0.12em" font-family="Segoe UI, Inter, sans-serif">ENGINE</text>
  <text x="586" y="164" text-anchor="middle" fill="#F8FAFC" font-size="15" font-weight="600" font-family="Segoe UI, Inter, sans-serif">Narrative</text>

  <path d="M652 144 H676" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 5 -->
  <rect x="680" y="88" width="256" height="112" rx="12" fill="#111827" stroke="#22C55E" stroke-opacity="0.55"/>
  <text x="808" y="114" text-anchor="middle" fill="#86EFAC" font-size="10" letter-spacing="0.12em" font-family="Segoe UI, Inter, sans-serif">INTELLIGENCE LAYER</text>
  <rect x="696" y="126" width="108" height="28" rx="8" fill="#0F172A" stroke="#22C55E" stroke-opacity="0.35"/>
  <text x="750" y="145" text-anchor="middle" fill="#E2E8F0" font-size="11" font-weight="600" font-family="Segoe UI, Inter, sans-serif">Radar</text>
  <rect x="812" y="126" width="108" height="28" rx="8" fill="#0F172A" stroke="#22C55E" stroke-opacity="0.35"/>
  <text x="866" y="145" text-anchor="middle" fill="#E2E8F0" font-size="11" font-weight="600" font-family="Segoe UI, Inter, sans-serif">Market Map</text>
  <rect x="696" y="162" width="108" height="28" rx="8" fill="#0F172A" stroke="#22C55E" stroke-opacity="0.35"/>
  <text x="750" y="181" text-anchor="middle" fill="#E2E8F0" font-size="11" font-weight="600" font-family="Segoe UI, Inter, sans-serif">Sectors</text>
  <rect x="812" y="162" width="108" height="28" rx="8" fill="#0F172A" stroke="#22C55E" stroke-opacity="0.35"/>
  <text x="866" y="181" text-anchor="middle" fill="#E2E8F0" font-size="11" font-weight="600" font-family="Segoe UI, Inter, sans-serif">Replay</text>
